<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Page Not Found — Product Prototypes</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #f5f6f8;
    color: #1b1f27;
  }
  .box { text-align: center; max-width: 420px; padding: 24px; }
  .code { font-size: 13px; font-weight: 700; letter-spacing: 0.08em; color: #667085; }
  h1 { font-size: 22px; margin: 8px 0 6px; }
  p { color: #667085; margin: 0 0 20px; }
  a.btn {
    display: inline-block;
    background: #2f5fdc;
    color: #fff;
    text-decoration: none;
    font-size: 14px;
    font-weight: 600;
    padding: 10px 18px;
    border-radius: 6px;
  }
  a.btn:hover { background: #2549ad; }
</style>
</head>
<body>
  <div class="box">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>This page doesn't exist, or the prototype it pointed to was moved or removed.</p>
    <!-- href is filled in by script below: a relative "./" would resolve
         against the *requested* (nonexistent) URL, not the physical location
         of this file, so nested 404s need the repo root computed from location. -->
    <a class="btn" id="home-link" href="/">Back to Portal</a>
  </div>
  <script>
    (function () {
      var host = location.hostname;
      var root = '/';
      if (host.endsWith('.github.io')) {
        var firstSegment = location.pathname.split('/').filter(Boolean)[0];
        if (firstSegment) root = '/' + firstSegment + '/';
      }
      document.getElementById('home-link').href = root;
    })();
  </script>
</body>
</html>
